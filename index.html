<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game UI</title>

    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="main">

        <!-- YE CODE .main KE ANDAR SABSE PEHLE ADD KARDO -->
        <h1 class="bg-text left-text">GAME</h1>
        <h1 class="bg-text right-text">SQUID</h1>

        <!-- NAVBAR -->
        <nav>

            <div class="logo">
                <img src="./images/logo-Photoroom.png" alt="">
            </div>

            <div class="nav-links">
                <a href="#">About</a>
                <a href="#" class="active">Watch now</a>
                <a href="#">Actors</a>
                <a href="#">Contact</a>
            </div>

            <div class="menu">
                <i class="ri-menu-3-line"></i>
            </div>

        </nav>

        <!-- HERO SECTION -->
        <section class="hero">

            <!-- LEFT -->
            <div class="left">

                <img src="./images/logo-Photoroom.png" class="title-img" alt="">

                <p>
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang
                    <br>
                    Season 1: 9 Episodes
                </p>

                <div class="buttons">

                    <button class="play-btn">
                        <i class="ri-play-circle-fill"></i>
                        Play Now
                    </button>

                    <button class="trailer-btn">
                        <i class="ri-play-mini-line"></i>
                        Watch Trailer
                    </button>

                </div>

            </div>

            <!-- CENTER -->
            <div class="center-scroll">
                <span>SCROLL</span>
                <div class="line"></div>
            </div>

            <!-- RIGHT -->
            <div class="right">

                <img src="./images/newimg-removebg-preview.png" class="main-img" alt="">

                <div class="social-icons">
                    <i class="ri-twitter-x-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-circle-line"></i>
                </div>

            </div>

        </section>

        <!-- CARDS -->
        <section class="cards">

            <div class="card">
                <img src="./images/newcard-img.jpg" alt="">
                <div class="play">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

            <div class="card">
                <img src="./images/card1-img.jpg" alt="">
                <div class="play">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

            <div class="card">
                <img src="./images/newcard-img2.jpg" alt="">
                <div class="play">
                    <i class="ri-play-fill"></i>
                </div>
            </div>

        </section>

    </div>

</body>

</html>
